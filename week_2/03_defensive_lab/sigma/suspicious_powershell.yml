title: Suspicious PowerShell Command Execution
id: 7b2e1f4a-9c2d-4b8a-8e1c-5d9f0a2b3c4d
status: experimental
description: Detects the use of PowerShell with the -Command flag, often used in initial access or execution phases.
author: Abhishek
date: 2026/03/06
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains: 
            - '-Command'
            - '-enc'
            - '-ExecutionPolicy Bypass'
    condition: selection
falsepositives:
    - Administrative maintenance scripts
level: medium
tags:
    - attack.execution
    - attack.t1059.001